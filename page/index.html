<script>
    
    const whispers =[
        "世人有时轻看物质，不知道人生难料，须有旧物相伴，回忆才能轻轻附着其上。 ——洪爱珠《老派少女购物路线》",
        "画简单的画，跑调也要唱歌，写很烂的小诗...你不需要擅长某件事才能享受它。",
        "所有的侏儒在他们父亲眼里都是私生子。 ——《权力的游戏》",
        "不要忘记你是谁，因为这个世界不会忘记。把你的缺陷变成你的铠甲。",
        "我喜欢睡觉，睡觉不喜欢我。 ——Goblynn",
        "没有一种批判比自我批判更强烈，也没有一个法官比我们自己更严苛。 ——《蛤蟆先生》",
        "如果不知道该往哪走，就先给自己搭一个温馨的窝吧。",
        "一个人怎么样，不在于他知道什么，而在于他在所知道的东西中认同什么。 ——《风声》观后"
    ];

    const whisperBox = document.getElementById('goblynn-whisper');
    const whisperText = document.getElementById('whisper-text');

    
    let availableIndices =[];
    let lastShownIndex = -1; 

    function changeWhisper() {
        
        if (availableIndices.length === 0) {
            for (let i = 0; i < whispers.length; i++) {
                availableIndices.push(i);
            }
        }

        
        let randomIndexPosition = Math.floor(Math.random() * availableIndices.length);
        let selectedIndex = availableIndices[randomIndexPosition];

        
        
        if (selectedIndex === lastShownIndex && whispers.length > 1) {
            randomIndexPosition = (randomIndexPosition + 1) % availableIndices.length;
            selectedIndex = availableIndices[randomIndexPosition];
        }

        
        availableIndices.splice(randomIndexPosition, 1);
        lastShownIndex = selectedIndex; 

        
        whisperText.style.opacity = 0;
        setTimeout(() => {
            whisperText.innerText = whispers[selectedIndex];
            whisperText.style.opacity = 1;
        }, 300);
    }

    
    changeWhisper();

    
    whisperBox.addEventListener('click', changeWhisper);
</script>

<script>
const staticDir = "https://goblynn-h.github.io/"
const ap = new APlayer({
    container: document.getElementById('aplayer'),
    audio: [],
    fixed: true,
    lrcType: 3,
    audio: [
        {
            
            name: '你听得到',
            artist: '周杰伦',
            url: staticDir + 'music/周杰伦 - 你听得到/song.mp3',
            cover: staticDir + 'music/周杰伦 - 你听得到/cover.webp',
            lrc: staticDir + 'music/周杰伦 - 你听得到/lyrics.lrc',
        }
    ]
});
    

    window.onbeforeunload = () => {
        
        const playInfo = {
            index: ap.list.index,
            currentTime: ap.audio.currentTime,
            paused: ap.paused
        };
        localStorage.setItem("playInfo", JSON.stringify(playInfo));
    };

    

    window.onload = () => {
        
        const playInfo = JSON.parse(localStorage.getItem("playInfo"));
        if (!playInfo) {
            return;
        }
        
        ap.list.switch(playInfo.index);
        
        setTimeout(() => {
            
            ap.seek(playInfo.currentTime);
            
            if (!playInfo.paused) {
                ap.play()
            }
        }, 500);
    };
</script>

<body>
    <div id="rainBox"></div>
    <div class="content"> 
    </div>
    <script>
        const rainToggleBtn = document.getElementById('rainToggleBtn');
        const rainBox = document.getElementById('rainBox');

        let rainIsActive = false; 
        let rainIntervalId; 

        
        function toggleRain() {
            if (rainIsActive) {
                
                clearInterval(rainIntervalId); 
                rainBox.innerHTML = ''; 
                rainIsActive = false;
                
                rainToggleBtn.classList.remove('active'); 
            } else {
                
                rainIsActive = true;
                rainIntervalId = setInterval(addRaindrop, 50); 
                
                rainToggleBtn.classList.add('active');
            }
        }

        
        rainToggleBtn.addEventListener('click', toggleRain);

        
        function addRaindrop() {
            let boxHeight = rainBox.clientHeight;
            let boxWidth = rainBox.clientWidth;

            const rain = document.createElement('div');
            rain.classList.add('rain');
            rain.style.top = 0;
            rain.style.left = Math.random() * boxWidth + 'px';
            rain.style.opacity = Math.random();
            rainBox.appendChild(rain);

            let race = 1;
            const timer = setInterval(()=>{
                if(parseInt(rain.style.top) > boxHeight){
                    clearInterval(timer);
                    if (rainBox.contains(rain)) { 
                        rainBox.removeChild(rain);
                    }
                }
                race++;
                rain.style.top = parseInt(rain.style.top) + race + 'px';
            }, 20);
        }

        
        window.onresize = function(){
            rainBox.style.width = window.innerWidth + 'px';
            rainBox.style.height = window.innerHeight + 'px';
        };
    </script>
